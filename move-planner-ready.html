<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Boise → Bozeman</title>
<style>
:root {
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e9a;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-text:#085041;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;
  --pink-bg:#FBEAF0;--pink-text:#72243E;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --red:#E24B4A;--radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe9;--text2:#a0a09a;--text3:#686864;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --teal-bg:#04342C;--teal-text:#9FE1CB;
    --amber-bg:#412402;--amber-text:#FAC775;
    --blue-bg:#042C53;--blue-text:#B5D4F4;
    --pink-bg:#4B1528;--pink-text:#F4C0D1;
    --green-bg:#173404;--green-text:#C0DD97;
    --purple-bg:#26215C;--purple-text:#CECBF6;
    --gray-bg:#2C2C2A;--gray-text:#D3D1C7;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* Auth */
#auth-screen{align-items:center;justify-content:center;padding:2rem;text-align:center;}
.auth-icon{width:60px;height:60px;background:var(--teal-bg);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;}
#auth-screen h1{font-size:24px;font-weight:700;margin-bottom:8px;}
#auth-screen p{font-size:14px;color:var(--text2);margin-bottom:2rem;line-height:1.6;max-width:280px;}
.g-btn{display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:13px 22px;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;width:100%;max-width:280px;justify-content:center;}
.g-btn:active{opacity:0.7;}
.auth-note{font-size:12px;color:var(--text3);margin-top:14px;max-width:260px;}

/* Loading */
#loading-screen{align-items:center;justify-content:center;gap:14px;}
.spinner{width:30px;height:30px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen p{font-size:14px;color:var(--text2);}

/* App */
.header{padding:16px 16px 0;padding-top:calc(16px + env(safe-area-inset-top,0px));}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.htitle{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.user-pill{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);}
.hsub{font-size:13px;color:var(--text2);}
.sync-bar{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 0;font-size:11px;color:var(--text3);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.sdot.syncing{background:var(--amber-text);animation:pulse 1s infinite;}
.sdot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
.stats-wrap{padding:8px 16px 0;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:9px 11px;}
.snum{font-size:21px;font-weight:700;}
.slabel{font-size:11px;color:var(--text2);margin-top:1px;}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--teal);border-radius:2px;transition:width 0.4s;}
.tabs{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 14px;border:0.5px solid var(--border2);border-radius:20px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;cursor:pointer;}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.fbar{display:flex;gap:6px;padding:8px 16px 0;overflow-x:auto;scrollbar-width:none;}
.fbar::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:4px 12px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);background:transparent;cursor:pointer;}
.fbtn.active{background:var(--teal-bg);color:var(--teal-text);border-color:transparent;}
.content{padding:12px 16px;padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));}

/* Tasks */
.wlabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 7px;}
.wlabel:first-child{margin-top:0;}
.tcard{background:var(--bg2);border-radius:var(--radius);margin-bottom:6px;}
.trow{display:flex;align-items:flex-start;gap:12px;padding:12px;cursor:pointer;border-radius:var(--radius);}
.trow:active{opacity:0.65;}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.chk.on{background:var(--teal);border-color:var(--teal);}
.chk svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none;opacity:0;transition:opacity 0.15s;}
.chk.on svg{opacity:1;}
.tbody{flex:1;min-width:0;}
.ttitle{font-size:14px;line-height:1.45;color:var(--text);}
.trow.done .ttitle{text-decoration:line-through;color:var(--text3);}
.tmeta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.ztag{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--bg3);color:var(--text2);}
.otag{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500;}

/* Section heads */
.shead{display:flex;align-items:center;justify-content:space-between;margin:14px 0 7px;}
.shead:first-child{margin-top:0;}
.sname{font-size:14px;font-weight:600;}
.scnt{font-size:12px;color:var(--text2);}
.opill{font-size:13px;font-weight:600;padding:3px 12px;border-radius:20px;}

/* Handover */
.hocat{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 7px;}
.hocat:first-child{margin-top:0;}
.hocard{background:var(--bg2);border-radius:var(--radius);margin-bottom:6px;}
.horrow{display:flex;gap:12px;padding:12px;cursor:pointer;border-radius:var(--radius);}
.horrow:active{opacity:0.65;}
.horrow.done .hotext{text-decoration:line-through;color:var(--text3);}
.hotext{font-size:14px;line-height:1.45;}
.honote{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.35;}

/* Forgotten */
.fcard{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:8px;}
.ftitle{font-size:13px;font-weight:600;margin-bottom:7px;}
.fitem{font-size:13px;color:var(--text2);padding:2px 0;}

/* Banners */
.banner{padding:11px 13px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5;margin-bottom:12px;}
.banner.info{background:var(--blue-bg);color:var(--blue-text);}
.banner.warn{background:var(--amber-bg);color:var(--amber-text);}
.miniprog{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.mpbar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mpfill{height:100%;background:var(--teal);border-radius:2px;transition:width 0.3s;}
.mplabel{font-size:12px;color:var(--text2);white-space:nowrap;}
.empty{font-size:14px;color:var(--text2);padding-top:1rem;}
</style>
</head>

</div>

];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state={done:{},handoverDone:{}};
let fileId=null,accessToken=null,tokenClient=null;
let currentTab='timeline',currentFilter='all';
let saveTimer=null;

// ── SCREENS ───────────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function loading(msg){document.getElementById('lmsg').textContent=msg;show('loading-screen');}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function waitForGSI(cb,tries=0){
  if(typeof google!=='undefined'&&google.accounts)return cb();
  if(tries>30)return show('auth-screen');
  setTimeout(()=>waitForGSI(cb,tries+1),200);
}

function initAuth(){
  waitForGSI(()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,
      scope:SCOPE,
      callback:(resp)=>{
        if(resp.error){show('auth-screen');return;}
        accessToken=resp.access_token;
        onAuthed();
      }
    });
    show('auth-screen');
  });
}

function handleSignIn(){
  if(!tokenClient){alert('Still loading. Please wait a moment and try again.');return;}
  tokenClient.requestAccessToken({prompt:'consent'});
}

async function onAuthed(){
  loading('Loading your move plan…');
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${accessToken}`}});
    const d=await r.json();
    document.getElementById('upill').textContent=d.given_name||d.name||'You';
  }catch{}
  await loadState();
  show('app-screen');
  renderAll();
  setInterval(pollState,15000);
}

// ── DRIVE ─────────────────────────────────────────────────────────────────────
function auth(){return{Authorization:`Bearer ${accessToken}`};}

async function loadState(){
  setSyncStatus('syncing','Syncing…');
  try{
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${FILENAME}'&fields=files(id)`,{headers:auth()});
    const d=await r.json();
    if(d.files&&d.files.length){
      fileId=d.files[0].id;
      const f=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:auth()});
      const j=await f.json();
      state={done:j.done||{},handoverDone:j.handoverDone||{}};
    }
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('err','Sync error');}
}

async function saveState(){
  setSyncStatus('syncing','Saving…');
  const body=JSON.stringify(state);
  try{
    if(!fileId){
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:FILENAME,parents:['appDataFolder']})],{type:'application/json'}));
      form.append('file',new Blob([body],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:auth(),body:form});
      const d=await r.json();
      fileId=d.id;
    }else{
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{...auth(),'Content-Type':'application/json'},body});
    }
    setSyncStatus('ok','Saved ✓');
    setTimeout(()=>setSyncStatus('ok','Synced'),2000);
  }catch{setSyncStatus('err','Save failed');}
}

async function pollState(){
  if(!fileId)return;
  try{
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:auth()});
    const remote=await r.json();
    const rs=JSON.stringify({done:remote.done||{},handoverDone:remote.handoverDone||{}});
    if(rs!==JSON.stringify(state)){
      state={done:remote.done||{},handoverDone:remote.handoverDone||{}};
      renderAll();
      setSyncStatus('ok','Updated ↓');
      setTimeout(()=>setSyncStatus('ok','Synced'),2000);
    }
  }catch{}
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveState,700);}
function setSyncStatus(s,msg){
  const d=document.getElementById('sdot');
  d.className='sdot'+(s==='syncing'?' syncing':s==='err'?' err':'');
  document.getElementById('slabel').textContent=msg;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleTask(id){state.done[id]=!state.done[id];scheduleSave();renderAll();}
function toggleHandover(key){state.handoverDone[key]=!state.handoverDone[key];scheduleSave();renderHandover();updateStats();}
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('fbar').style.display=tab==='timeline'?'flex':'none';
  renderContent();
}
function switchFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderTimeline();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){updateStats();renderContent();}
function updateStats(){
  const total=TASKS.length,done=TASKS.filter(t=>state.done[t.id]).length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-pct').textContent=Math.round(done/total*100)+'%';
  document.getElementById('pfill').style.width=Math.round(done/total*100)+'%';
}
function renderContent(){
  if(currentTab==='timeline')renderTimeline();
  else if(currentTab==='byowner')renderByOwner();
  else if(currentTab==='byroom')renderByRoom();
  else if(currentTab==='handover')renderHandover();
  else renderForgotten();
}
function chk(on){return`<div class="chk${on?' on':''}"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>`;}
function tcard(t){
  const done=!!state.done[t.id];
  return`<div class="tcard"><div class="trow${done?' done':''}" onclick="toggleTask(${t.id})">${chk(done)}<div class="tbody"><div class="ttitle">${t.title}</div><div class="tmeta"><span class="ztag">${t.zone}</span><span class="otag" style="background:${OC[t.owner]};color:${OT[t.owner]};">${t.owner}</span></div></div></div></div>`;
}
function renderTimeline(){
  let tasks=TASKS;
  if(currentFilter==='open')tasks=TASKS.filter(t=>!state.done[t.id]);
  if(currentFilter==='unassigned')tasks=TASKS.filter(t=>t.owner==='Unassigned'&&!state.done[t.id]);
  const weeks=[...new Set(tasks.map(t=>t.week))];
  const c=document.getElementById('content');
  if(!tasks.length){c.innerHTML='<p class="empty">Nothing here.</p>';return;}
  c.innerHTML=weeks.map(w=>`<div class="wlabel">${w}</div>${tasks.filter(t=>t.week===w).map(tcard).join('')}`).join('');
}
function renderByOwner(){
  const owners=['Colin','Katie','Locksley','Everly','Both girls','Everyone','Unassigned'];
  document.getElementById('content').innerHTML=owners.map(o=>{
    const ot=TASKS.filter(t=>t.owner===o);if(!ot.length)return'';
    const done=ot.filter(t=>state.done[t.id]).length;
    return`<div class="shead"><span class="opill" style="background:${OC[o]};color:${OT[o]};">${o}</span><span class="scnt">${done}/${ot.length}</span></div>${ot.map(tcard).join('')}`;
  }).join('');
}
function renderByRoom(){
  const rooms=[...new Set(TASKS.map(t=>t.zone))].sort();
  document.getElementById('content').innerHTML=rooms.map(r=>{
    const rt=TASKS.filter(t=>t.zone===r),done=rt.filter(t=>state.done[t.id]).length;
    return`<div class="shead"><span class="sname">${r}</span><span class="scnt">${done}/${rt.length}</span></div>${rt.map(tcard).join('')}`;
  }).join('');
}
function renderHandover(){
  const total=HANDOVER.reduce((a,c)=>a+c.items.length,0);
  const done=Object.values(state.handoverDone).filter(Boolean).length;
  document.getElementById('content').innerHTML=`
    <div class="banner info">Pull out your lease and cross-reference each item. This is where deposits are won or lost.</div>
    <div class="miniprog"><div class="mpbar"><div class="mpfill" style="width:${Math.round(done/total*100)}%"></div></div><span class="mplabel">${done} / ${total}</span></div>
    ${HANDOVER.map(cat=>`<div class="hocat">${cat.cat}</div>${cat.items.map((item,i)=>{
      const key=cat.cat+'-'+i,on=!!state.handoverDone[key];
      return`<div class="hocard"><div class="horrow${on?' done':''}" onclick="toggleHandover('${key}')">${chk(on)}<div><div class="hotext">${item.t}</div>${item.n?`<div class="honote">${item.n}</div>`:''}</div></div></div>`;
    }).join('')}`).join('')}`;
}
function renderForgotten(){
  document.getElementById('content').innerHTML=`
    <div class="banner warn">Walk each room with this list. These are what families most often discover missing after the truck leaves.</div>
    ${FORGOTTEN.map(f=>`<div class="fcard"><div class="ftitle">${f.cat}</div>${f.items.map(i=>`<div class="fitem">· ${i}</div>`).join('')}</div>`).join('')}`;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  if(CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID_HERE'){
    document.getElementById('loading-screen').innerHTML=`<div style="text-align:center;padding:2rem;max-width:300px;"><div style="font-size:2rem;margin-bottom:1rem">⚙️</div><div style="font-size:16px;font-weight:600;margin-bottom:8px;">Client ID not set</div><div style="font-size:14px;color:var(--text2);line-height:1.6;">Open this file in a text editor and replace <code style="background:var(--bg3);padding:2px 5px;border-radius:4px;">430544290766-ti8ai5upac1p30501pu6ti1k43clh37v.apps.googleusercontent.com</code> with your Google OAuth Client ID.</div></div>`;
    return;
  }
  initAuth();
});
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
